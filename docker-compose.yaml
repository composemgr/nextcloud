# nginx proxy address - http://172.17.0.1:59056

name: nextcloud
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  nextcloud-aio-mastercontainer:
    image: nextcloud/all-in-one:latest
    container_name: nextcloud-aio-mastercontainer # do not change this
    domainname: ${BASE_DOMAIN_NAME:-}
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    init: true
    logging: *default-logging
    network_mode: bridge
    environment:
      - 'TZ=${TZ:-America/New_York}'
      - 'TALK_PORT=3478'
      - 'APACHE_PORT=11000'
      - 'NEXTCLOUD_UPLOAD_LIMIT=10G'
      - 'SKIP_DOMAIN_VALIDATION=true'
      - 'COLLABORA_SECCOMP_DISABLED=false'
      - 'NEXTCLOUD_MOUNT=/mnt'
      - 'NEXTCLOUD_DATADIR=/media/nextcloud'
      - 'NEXTCLOUD_MAX_TIME=7200'
      - 'NEXTCLOUD_MEMORY_LIMIT=1024M'
      - 'NEXTCLOUD_ADDITIONAL_APKS=nano imagemagick'
      - 'NEXTCLOUD_ADDITIONAL_PHP_EXTENSIONS=imagick'
      - 'NEXTCLOUD_STARTUP_APPS=deck twofactor_totp tasks calendar contacts notes'
      - 'FULLTEXTSEARCH_JAVA_OPTIONS=-Xms1024M -Xmx1024M'
      - 'WATCHTOWER_DOCKER_SOCKET_PATH=/var/run/docker.sock'
      - 'BORG_RETENTION_POLICY=--keep-within=7d --keep-weekly=4 --keep-monthly=6'
    ports:
      - 3478:3478/TCP
      - 3478:3478/UDP
      - 172.17.0.1:59056:8080
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
      - nextcloud_aio_mastercontainer:/mnt/docker-aio-config

volumes:
  nextcloud_aio_mastercontainer:
    name: nextcloud_aio_mastercontainer # This line is not allowed to be changed as otherwise the built-in backup solution will not work
