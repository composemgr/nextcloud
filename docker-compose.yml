name: nextcloud
services:
  app:
    image: nextcloud/all-in-one:latest
    container_name: nextcloud
    hostname: nextcloud
    restart: always
    pull_policy: always
    init: true
    environment:
      - TALK_PORT=3478
      - APACHE_PORT=11000
      - APACHE_IP_BINDING=127.0.0.1
      - NEXTCLOUD_UPLOAD_LIMIT=10G
      - SKIP_DOMAIN_VALIDATION=true
      - COLLABORA_SECCOMP_DISABLED=false
      - NEXTCLOUD_MOUNT=/mnt
      - NEXTCLOUD_DATADIR=/mnt/data/nextcloud
      - NEXTCLOUD_MAX_TIME=7200
      - NEXTCLOUD_MEMORY_LIMIT=512M
      - NEXTCLOUD_STARTUP_APPS=deck twofactor_totp tasks calendar contacts notes
      - NEXTCLOUD_ADDITIONAL_APKS=imagemagick
      - NEXTCLOUD_ADDITIONAL_PHP_EXTENSIONS=imagick
      - WATCHTOWER_DOCKER_SOCKET_PATH=/var/run/docker.sock
      - BORG_RETENTION_POLICY=--keep-within=7d --keep-weekly=4 --keep-monthly=6
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
      - /var/lib/srv/$USER/docker/nextcloud/all-in-one/latest/rootfs/data/nextcloud:/mnt/data/nextcloud
      - /var/lib/srv/$USER/docker/nextcloud/all-in-one/latest/rootfs/config/nextcloud:/mnt/docker-aio-config
    ports:
      - 172.17.0.1:59056:8080
    networks:
      - nextcloud

networks:
  nextcloud:
    name: nextcloud
    external: false
